<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PanSearch - 网盘资源极速搜索</title>
    <meta name="description" content="聚合全网网盘资源，支持夸克、百度、阿里云盘、UC等，极速搜索，一键转存。">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="bg-glow"></div>
    <div class="bg-blur"></div>

    <div class="app">

        <!-- ===== SEARCH VIEW ===== -->
        <section id="view-search" class="view active">
            <div class="hero">
                <div id="hero-header">
                    <div class="logo">🔍 <strong>PanSearch</strong></div>
                    <h1>搜索<span class="g">全网网盘</span>资源</h1>
                </div>

                <div class="search-bar-wrap">
                    <div class="search-bar" id="search-bar">
                        <input id="search-input" type="text" placeholder="输入关键词，如：三体、奥本海默…" autocomplete="off"
                            autofocus>
                        <div class="search-btn-minimal">
                            <button id="search-btn" title="全网搜索">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                    <circle cx="11" cy="11" r="8"></circle>
                                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                                </svg>
                            </button>
                        </div>
                    </div>
                    <!-- Search History Dropdown (Header-less Tag Cloud) -->
                    <div id="history-dropdown" class="history-dropdown" style="display: none;">
                        <div id="history-list" class="history-tags-cloud"></div>
                    </div>
                    <!-- Live Search Suggestions Dropdown -->
                    <div id="suggestion-dropdown" class="suggestion-dropdown" style="display: none;">
                        <div id="suggestion-list" class="suggestion-list"></div>
                    </div>
                </div>

                <div class="type-filter" id="main-filter">
                    <button class="tag active" data-type="all">全部</button>
                    <button class="tag" data-type="quark">夸克</button>
                    <button class="tag" data-type="baidu">百度</button>
                    <button class="tag" data-type="aliyun">阿里</button>
                    <button class="tag" data-type="uc">UC</button>
                    <button class="tag" data-type="xunlei">迅雷</button>
                    <button class="tag" data-type="mobile">移动</button>
                    <button class="tag" data-type="telecom">天翼</button>
                    <button class="tag" data-type="pikpak">PikPak</button>
                    <button class="tag" data-type="115">115</button>
                </div>

                <!-- ===== SEARCH SYNC AREA (Unified Hot & Discovery) ===== -->
                <div id="discovery-area" class="discovery-grid" style="margin-top: 16px;">
                    <!-- Hot Search Row -->
                    <div class="disc-col-inline" id="main-hot">
                        <span class="disc-title clickable-title" onclick="loadHotKeywords(true)" title="点击刷新热搜">🔥
                            热门搜索：</span>
                        <div id="hot-tags" class="hot-tags"></div>
                    </div>

                    <!-- Discovery Rows -->
                    <div class="disc-col-inline">
                        <span class="disc-title clickable-title" onclick="loadDiscoverySingle('movie')"
                            title="点击刷新影视资源">🎬 影视动态：</span>
                        <div id="list-movie" class="hot-tags">
                            <div class="loading-spinner mini"></div>
                        </div>
                    </div>
                    <div class="disc-col-inline">
                        <span class="disc-title clickable-title" onclick="loadDiscoverySingle('doc')"
                            title="点击刷新资料资源">📚 学习资料：</span>
                        <div id="list-doc" class="hot-tags">
                            <div class="loading-spinner mini"></div>
                        </div>
                    </div>
                    <div class="disc-col-inline">
                        <span class="disc-title clickable-title" onclick="loadDiscoverySingle('other')"
                            title="点击刷新其他资源">📦 其他资源：</span>
                        <div id="list-other" class="hot-tags">
                            <div class="loading-spinner mini"></div>
                        </div>
                    </div>
                </div>

                <div id="results-grid" class="results-grid" style="margin-top: 24px;"></div>
        </section>

    </div>

    <div id="toast-container"></div>
    <script src="app.js"></script>
</body>

</html>
