<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PanSearch - 网盘资源极速搜索</title>
    <meta name="description" content="聚合全网网盘资源，支持夸克、百度、阿里云盘、UC等，极速搜索，一键转存。">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="bg-glow"></div>
    <div class="bg-blur"></div>

    <div class="app">

        <!-- ===== SEARCH VIEW ===== -->
        <section id="view-search" class="view active">
            <div class="hero">
                <div class="logo">🔍 <strong>PanSearch</strong></div>
                <h1>搜索<span class="g">全网网盘</span>资源</h1>
                <p class="sub">聚合夸克 · 百度 · 阿里 · UC · 115 · PikPak</p>

                <div class="search-bar-wrap">
                    <div class="search-bar" id="search-bar">
                        <input id="search-input" type="text" placeholder="输入关键词，如：三体、奥本海默…" autocomplete="off"
                            autofocus>
                        <div class="search-btn-group">
                            <button id="search-fuzzy-btn" class="btn-group-left" title="获取全网尽可能多的资源">模糊搜索</button>
                            <div class="btn-divider"></div>
                            <button id="search-exact-btn" class="btn-group-right" title="仅极速匹配精准关键词">精确搜索</button>
                        </div>
                    </div>
                    <!-- Search History Dropdown -->
                    <div id="history-dropdown" class="history-dropdown" style="display: none;">
                        <div class="dropdown-header">
                            <span class="history-title">🕒 搜索记录</span>
                            <button id="clear-all-history" class="btn-text-primary">清空</button>
                        </div>
                        <div id="history-list" class="history-tags-cloud"></div>
                    </div>
                </div>

                <div class="type-filter" id="main-filter">
                    <button class="tag active" data-type="all">全部</button>
                    <button class="tag" data-type="quark">夸克</button>
                    <button class="tag" data-type="baidu">百度</button>
                    <button class="tag" data-type="aliyun">阿里</button>
                    <button class="tag" data-type="uc">UC</button>
                    <button class="tag" data-type="xunlei">迅雷</button>
                    <button class="tag" data-type="mobile">移动</button>
                    <button class="tag" data-type="telecom">天翼</button>
                    <button class="tag" data-type="pikpak">PikPak</button>
                    <button class="tag" data-type="115">115</button>
                </div>

                <div class="hot-search-box" id="main-hot">
                    <span class="hot-title">🔥 热门搜索：</span>
                    <div id="hot-tags" class="hot-tags"></div>
                </div>
            </div>

            <!-- Discovery (3-column layout) -->
            <div class="discovery-header">
                <h2>✨ 发现新鲜资源</h2>
                <span id="refresh-discovery" class="refresh-link" title="点击刷新最新资源">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M23 4v6h-6"></path>
                        <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
                    </svg>
                    刷新
                </span>
            </div>
            <div id="discovery" class="discovery-grid">
                <div class="disc-col">
                    <h3>🎬 影视动态</h3>
                    <div id="list-movie" class="latest-list">
                        <div class="loading-spinner mini"></div>
                    </div>
                </div>
                <div class="disc-col">
                    <h3>📚 学习资料</h3>
                    <div id="list-doc" class="latest-list">
                        <div class="loading-spinner mini"></div>
                    </div>
                </div>
                <div class="disc-col">
                    <h3>📦 其他资源</h3>
                    <div id="list-other" class="latest-list">
                        <div class="loading-spinner mini"></div>
                    </div>
                </div>
            </div>
        </section>

        <section id="view-results" class="view">
            <div class="results-header">
                <button id="back-btn" class="back-btn">← 返回</button>
                <div class="search-bar-wrap compact">
                    <div class="search-bar compact" id="results-search-bar">
                        <input id="results-input" type="text" placeholder="再搜一次…" autocomplete="off">
                        <div class="search-btn-group">
                            <button id="results-search-btn" class="btn-group-left">自动搜索</button>
                        </div>
                    </div>
                </div>
                <span id="result-info" class="result-info"></span>
            </div>

            <!-- UI components synced from home -->
            <div class="results-ui-sync">
                <div class="type-filter" id="results-filter"></div>
                <div class="hot-search-box" id="results-hot"></div>
            </div>

            <div id="results-grid" class="results-grid"></div>
        </section>

    </div>

    <div id="toast-container"></div>
    <script src="app.js"></script>
</body>

</html>
