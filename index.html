<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PanSearch - 网盘资源极速搜索</title>
    <meta name="description" content="聚合全网网盘资源，支持夸克、百度、阿里云盘、UC等，极速搜索，一键转存。">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="bg-glow"></div>
    <div class="bg-blur"></div>

    <div class="app">

        <!-- ===== SEARCH VIEW ===== -->
        <section id="view-search" class="view active">
            <div class="hero">
                <div class="logo">🔍 <strong>PanSearch</strong></div>
                <h1>搜索<span class="g">全网网盘</span>资源</h1>
                <p class="sub">聚合夸克 · 百度 · 阿里 · UC · 115 · PikPak</p>

                <div class="search-bar-wrap">
                    <div class="search-bar" id="search-bar">
                        <input id="search-input" type="text" placeholder="输入关键词，如：三体、奥本海默…" autocomplete="off"
                            autofocus>
                        <div class="search-btn-minimal">
                            <button id="search-fuzzy-btn" title="综合推荐">模糊搜索</button>
                            <span class="btn-sep"></span>
                            <button id="search-exact-btn" title="极速匹配">精确搜索</button>
                        </div>
                    </div>
                    <!-- Search History Dropdown (Header-less Tag Cloud) -->
                    <div id="history-dropdown" class="history-dropdown" style="display: none;">
                        <div id="history-list" class="history-tags-cloud"></div>
                    </div>
                </div>

                <div class="type-filter" id="main-filter">
                    <button class="tag active" data-type="all">全部</button>
                    <button class="tag" data-type="quark">夸克</button>
                    <button class="tag" data-type="baidu">百度</button>
                    <button class="tag" data-type="aliyun">阿里</button>
                    <button class="tag" data-type="uc">UC</button>
                    <button class="tag" data-type="xunlei">迅雷</button>
                    <button class="tag" data-type="mobile">移动</button>
                    <button class="tag" data-type="telecom">天翼</button>
                    <button class="tag" data-type="pikpak">PikPak</button>
                    <button class="tag" data-type="115">115</button>
                </div>

                <div class="hot-search-box inline-flex" id="main-hot">
                    <span class="hot-title">🔥 热门搜索：</span>
                    <div id="hot-tags" class="hot-tags"></div>
                    <span id="refresh-hot" class="refresh-link" style="margin-left:8px;" title="刷新热搜">🔄</span>
                </div>
            </div>

            <!-- Discovery (3-column layout) -->
            <div id="discovery" class="discovery-grid" style="margin-top: 16px;">
                <div class="disc-col">
                    <h3 style="display:flex; justify-content:space-between; align-items:center;">
                        <span>🎬 影视动态</span>
                        <span class="refresh-link" onclick="loadDiscoverySingle('movie')" title="刷新">🔄</span>
                    </h3>
                    <div id="list-movie" class="hot-tags">
                        <div class="loading-spinner mini"></div>
                    </div>
                </div>
                <div class="disc-col">
                    <h3 style="display:flex; justify-content:space-between; align-items:center;">
                        <span>📚 学习资料</span>
                        <span class="refresh-link" onclick="loadDiscoverySingle('doc')" title="刷新">🔄</span>
                    </h3>
                    <div id="list-doc" class="hot-tags">
                        <div class="loading-spinner mini"></div>
                    </div>
                </div>
                <div class="disc-col">
                    <h3 style="display:flex; justify-content:space-between; align-items:center;">
                        <span>📦 其他资源</span>
                        <span class="refresh-link" onclick="loadDiscoverySingle('other')" title="刷新">🔄</span>
                    </h3>
                    <div id="list-other" class="hot-tags">
                        <div class="loading-spinner mini"></div>
                    </div>
                </div>
            </div>

            <div id="results-grid" class="results-grid" style="margin-top: 24px;"></div>
        </section>

    </div>

    <div id="toast-container"></div>
    <script src="app.js"></script>
</body>

</html>
